<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog – Samantha C. Lai</title>
  <link rel="stylesheet" href="../styles.css?v=11">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="site-logo">Samantha C. Lai</a>
      <nav class="main-nav">
        <ul>
          <li><a href="../projects.html">PROJECTS</a></li>
          <li><a href="../blogs.html">BLOGS</a></li>
          <li><a href="../about.html">ABOUT</a></li>
          <li><a href="../contact.html">CONTACT</a></li>
        </ul>
      </nav>
      <button class="mobile-menu-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="cover-card cover-golden" id="blog-cover">
    <div class="cover-card-content">
      <h1 id="blog-cover-title">Blog</h1>
    </div>
  </div>

  <main class="project-page">
    <article class="project-article" id="blog-content">
      <p class="loading-text">Loading blog post...</p>
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-logo">Samantha C. Lai</span>
      </div>
      <nav class="footer-nav">
        <ul>
          <li><a href="../projects.html">Projects</a></li>
          <li><a href="../blogs.html">Blogs</a></li>
          <li><a href="../about.html">About</a></li>
          <li><a href="../contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="footer-social">
        <a href="https://www.instagram.com/occasions.places" target="_blank" rel="noopener">Instagram</a>
        <a href="https://500px.com/p/occasionsplaces?view=photos" target="_blank" rel="noopener">500px</a>
      </div>
      <div class="footer-legal">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
  </footer>

  <script src="../api.js"></script>
  <script src="../cover-header.js"></script>
  <script>
    document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('open');
      this.classList.toggle('active');
    });

    function renderCarouselHero(title, date, images) {
      var slides = images.map(function(src, i) {
        return '<div class="carousel-slide"><img src="' + src + '" alt="' + title + ' – image ' + (i + 1) + '"></div>';
      }).join('');

      return '<section class="project-hero-carousel">' +
        '<div class="carousel" id="blog-carousel">' +
          '<div class="carousel-viewport">' +
            '<div class="carousel-track">' + slides + '</div>' +
          '</div>' +
          '<div class="carousel-overlay"></div>' +
          '<div class="carousel-title-overlay">' +
            '<h1>' + title + '</h1>' +
            '<div class="project-meta"><time>' + date + '</time></div>' +
          '</div>' +
          '<button class="carousel-arrow carousel-prev" aria-label="Previous">&#8592;</button>' +
          '<button class="carousel-arrow carousel-next" aria-label="Next">&#8594;</button>' +
          '<div class="carousel-counter"><span class="carousel-current">1</span> / <span class="carousel-total">' + images.length + '</span></div>' +
        '</div>' +
      '</section>';
    }

    function renderStaticHero(imgSrc, title, date) {
      return '<section class="project-hero-banner">' +
        '<img src="' + imgSrc + '" alt="' + title + '">' +
        '<div class="carousel-overlay"></div>' +
        '<div class="carousel-title-overlay">' +
          '<h1>' + title + '</h1>' +
          '<div class="project-meta"><time>' + date + '</time></div>' +
        '</div>' +
      '</section>';
    }

    function initBlogCarousel() {
      var track = document.querySelector('#blog-carousel .carousel-track');
      var slides = document.querySelectorAll('#blog-carousel .carousel-slide');
      var counter = document.querySelector('#blog-carousel .carousel-current');
      var prevBtn = document.querySelector('#blog-carousel .carousel-prev');
      var nextBtn = document.querySelector('#blog-carousel .carousel-next');
      if (!slides.length) return;

      var current = 0;
      var interval;
      var isAnimating = false;
      var DELAY = 4000;
      var total = slides.length;

      function goTo(index) {
        if (isAnimating) return;
        isAnimating = true;
        current = ((index % total) + total) % total;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        counter.textContent = current + 1;
        setTimeout(function() { isAnimating = false; }, 700);
      }

      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      function startAuto() {
        clearInterval(interval);
        interval = setInterval(next, DELAY);
      }

      prevBtn.addEventListener('click', function() { prev(); startAuto(); });
      nextBtn.addEventListener('click', function() { next(); startAuto(); });

      startAuto();
    }

    function extractImagesFromContent(htmlString) {
      var temp = document.createElement('div');
      temp.innerHTML = htmlString;
      var images = [];
      temp.querySelectorAll('img').forEach(function(img) {
        var src = img.getAttribute('src');
        if (src) images.push(src);
      });
      return images;
    }

    function stripImagesFromContent(htmlString) {
      var temp = document.createElement('div');
      temp.innerHTML = htmlString;
      temp.querySelectorAll('figure').forEach(function(fig) { fig.remove(); });
      temp.querySelectorAll('img').forEach(function(img) {
        var parent = img.parentElement;
        if (parent && parent.tagName === 'P' && parent.children.length === 1 && !parent.textContent.trim()) {
          parent.remove();
        } else {
          img.remove();
        }
      });
      return temp.innerHTML;
    }

    function replaceCoverWithHero(heroHtml) {
      var cover = document.getElementById('blog-cover');
      if (!cover) return;
      var spacer = cover.nextElementSibling;
      if (spacer && spacer.classList.contains('cover-spacer')) {
        spacer.remove();
      }
      cover.insertAdjacentHTML('afterend', heroHtml);
      cover.remove();
    }

    var slug = getSlugParam();
    if (!slug) {
      document.getElementById('blog-content').innerHTML = '<p>No blog post specified.</p>';
    } else {
      getBlogBySlug(slug).then(function(results) {
        if (!results.length) {
          document.getElementById('blog-content').innerHTML = '<p>Blog post not found.</p>';
          return;
        }
        var blog = results[0];
        document.title = blog.title.rendered + ' – Samantha C. Lai';

        var categories = getCategoryNames(blog);
        var date = formatDate(blog.date);
        var content = blog.content.rendered.trim();
        var contentImages = extractImagesFromContent(content);

        getMediaForPost(blog.id).then(function(media) {
          var mediaImages = media
            .filter(function(m) { return m.mime_type && m.mime_type.indexOf('image') === 0; })
            .map(function(m) { return m.source_url; });

          var heroImages = mediaImages.length ? mediaImages : contentImages;
          renderBlogPage(blog, date, categories, content, heroImages);
        }).catch(function() {
          renderBlogPage(blog, date, categories, content, contentImages);
        });
      }).catch(function() {
        document.getElementById('blog-content').innerHTML = '<p>Could not load blog post.</p>';
      });
    }

    function renderBlogPage(blog, date, categories, content, heroImages) {
      if (heroImages.length > 1) {
        replaceCoverWithHero(renderCarouselHero(blog.title.rendered, date, heroImages));
        initBlogCarousel();
        initCoverHeader(document.querySelector('.project-hero-carousel'));
      } else if (heroImages.length === 1) {
        replaceCoverWithHero(renderStaticHero(heroImages[0], blog.title.rendered, date));
        initCoverHeader(document.querySelector('.project-hero-banner'));
      } else {
        var coverTitle = document.getElementById('blog-cover-title');
        if (coverTitle) coverTitle.innerHTML = blog.title.rendered;
      }

      var hasHero = heroImages.length > 0;
      var bodyContent = hasHero ? stripImagesFromContent(content) : content;

      var html = '';
      if (!hasHero) {
        html += '<header class="project-header">' +
          '<h1>' + blog.title.rendered + '</h1>' +
          '<div class="project-meta">' +
            '<time>' + date + '</time>' +
            '<span class="meta-dot">&bull;</span>' +
          '</div>' +
        '</header>';
      }

      if (bodyContent.trim()) {
        html += '<div class="project-body">' + bodyContent + '</div>';
      } else if (blog.excerpt.rendered.trim()) {
        html += '<p class="project-intro">' + stripHtml(blog.excerpt.rendered) + '</p>';
      }

      if (categories.length) {
        html += '<div class="category-tags">' +
          categories.map(function(c) { return '<a href="#">' + c + '</a>'; }).join('') +
        '</div>';
      }

      document.getElementById('blog-content').innerHTML = html;
    }
  </script>

</body>
</html>
