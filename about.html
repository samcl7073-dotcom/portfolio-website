  <script>
    document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('open');
      this.classList.toggle('active');
    });

    getPage(2).then(function(page) {
      var el = document.getElementById('about-content');
      el.innerHTML = '<h1>' + page.title.rendered + '</h1>' + page.content.rendered;
    }).catch(function() {
      document.getElementById('about-content').innerHTML = '<h1>About Me</h1><p>Could not load content.</p>';
