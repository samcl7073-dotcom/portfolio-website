</head>
<body>

      <a href="../index.html" class="site-logo">Samantha C. Lai</a>

        <ul>

          <li><a href="../blogs.html">BLOGS</a></li>

          <li><a href="../contact.html">CONTACT</a></li>
        </ul>
      </nav>
      <button class="mobile-menu-btn" aria-label="Menu">
        <span></span><span></span><span></span>

    </div>
  </header>

  <!-- Hero area -->
  <div id="project-hero"></div>

  <main class="project-page">
    <article class="project-article" id="project-content">
      <p class="loading-text">Loading project...</p>
    </article>
  </main>

  <section class="past-projects" id="related-work" style="display:none;">
    <h2 class="section-heading">RELATED WORK</h2>
    <div class="projects-grid" id="related-grid"></div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-logo">Samantha C. Lai</span>
      </div>
      <nav class="footer-nav">
        <ul>
          <li><a href="../projects.html">Projects</a></li>
          <li><a href="../blogs.html">Blogs</a></li>
          <li><a href="../about.html">About</a></li>
          <li><a href="../contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="footer-social">
        <a href="https://www.instagram.com/occasions.places" target="_blank" rel="noopener">Instagram</a>
        <a href="https://500px.com/p/occasionsplaces?view=photos" target="_blank" rel="noopener">500px</a>

        <a href="#">Privacy Policy</a>

    </div>

  <script src="../api.js"></script>
  <script>
    document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('open');
      this.classList.toggle('active');
    });

    function renderCarouselHero(title, date, images) {
      var slides = images.map(function(src, i) {
        return '<div class="carousel-slide"><img src="' + src + '" alt="Film still ' + (i+1) + '"></div>';
      }).join('');

      return '<section class="project-hero-carousel">' +
        '<div class="carousel" id="project-carousel">' +
          '<div class="carousel-viewport">' +
            '<div class="carousel-track">' + slides + '</div>' +
          '</div>' +
          '<div class="carousel-overlay"></div>' +
          '<div class="carousel-title-overlay">' +
            '<h1>' + title + '</h1>' +
            '<div class="project-meta"><time>' + date + '</time></div>' +
          '</div>' +
          '<button class="carousel-arrow carousel-prev" aria-label="Previous">&#8592;</button>' +
          '<button class="carousel-arrow carousel-next" aria-label="Next">&#8594;</button>' +
          '<div class="carousel-counter"><span class="carousel-current">1</span> / <span class="carousel-total">' + images.length + '</span></div>' +
        '</div>' +
      '</section>';
    }

    function renderStaticHero(imgSrc, title, date) {
      return '<section class="project-hero-banner">' +
        '<img src="' + imgSrc + '" alt="' + title + '">' +
        '<div class="carousel-overlay"></div>' +
        '<div class="carousel-title-overlay">' +
          '<h1>' + title + '</h1>' +
          '<div class="project-meta"><time>' + date + '</time></div>' +
        '</div>' +
      '</section>';
    }

    function initCarousel() {
      var track = document.querySelector('#project-carousel .carousel-track');
      var slides = document.querySelectorAll('#project-carousel .carousel-slide');
      var counter = document.querySelector('#project-carousel .carousel-current');
      var prevBtn = document.querySelector('#project-carousel .carousel-prev');
      var nextBtn = document.querySelector('#project-carousel .carousel-next');
      if (!slides.length) return;

      var current = 0;
      var interval;
      var isAnimating = false;
      var DELAY = 4000;
      var total = slides.length;

      function goTo(index) {
        if (isAnimating) return;
        isAnimating = true;
        current = ((index % total) + total) % total;
        track.style.transform = 'translateX(-' + (current * 100) + '%)';
        counter.textContent = current + 1;
        setTimeout(function() { isAnimating = false; }, 700);
      }

      function next() { goTo(current + 1); }
      function prev() { goTo(current - 1); }

      function startAuto() {
        clearInterval(interval);
        interval = setInterval(next, DELAY);
      }

      prevBtn.addEventListener('click', function() { prev(); startAuto(); });
      nextBtn.addEventListener('click', function() { next(); startAuto(); });

      startAuto();
    }

    var CAROUSEL_SLUGS = ['feature-test-1'];

    var slug = getSlugParam();
    if (!slug) {
      document.getElementById('project-content').innerHTML = '<p>No project specified.</p>';
    } else {
      getProjectBySlug(slug).then(function(results) {
        if (!results.length) {
          document.getElementById('project-content').innerHTML = '<p>Project not found.</p>';
          return;
        }
        var project = results[0];
        document.title = project.title.rendered + ' – Samantha C. Lai';

        var categories = getCategoryNames(project);
        var date = formatDate(project.date);
        var useCarousel = CAROUSEL_SLUGS.indexOf(slug) !== -1;

        function renderContent() {
          var html = '';
          var content = project.content.rendered.trim();
          if (content) {
            var temp = document.createElement('div');
            temp.innerHTML = content;
            if (useCarousel) {
              temp.querySelectorAll('figure').forEach(function(fig) { fig.remove(); });
            }
            var children = temp.children;
            for (var i = children.length - 1; i >= 0; i--) {
              var text = children[i].textContent.trim().toLowerCase();
              if (text === 'related work' || text === 'other film and tv projects' || text === '') {
                children[i].remove();
              } else {
                break;
              }
            }
            content = temp.innerHTML.trim();
          }
          if (content) {
            html += '<div class="project-body">' + content + '</div>';
          }
          if (categories.length) {
            html += '<div class="category-tags">' +
              categories.map(function(c) { return '<a href="#">' + c + '</a>'; }).join('') +
            '</div>';
          }
          document.getElementById('project-content').innerHTML = html || '<p>' + stripHtml(project.excerpt.rendered) + '</p>';
        }

        if (useCarousel) {
          getMediaForPost(project.id).then(function(media) {
            var images = media
              .filter(function(m) { return m.mime_type && m.mime_type.indexOf('image') === 0; })
              .map(function(m) { return m.source_url; });
            if (images.length) {
              document.getElementById('project-hero').innerHTML = renderCarouselHero(project.title.rendered, date, images);
              initCarousel();
            } else {
              var img = getFeaturedImage(project, 'full');
              document.getElementById('project-hero').innerHTML = renderStaticHero(img, project.title.rendered, date);
            }
            renderContent();
          }).catch(function() {
            var img = getFeaturedImage(project, 'full');
            document.getElementById('project-hero').innerHTML = renderStaticHero(img, project.title.rendered, date);
            renderContent();
          });
        } else {
          var img = getFeaturedImage(project, 'full');
          document.getElementById('project-hero').innerHTML = renderStaticHero(img, project.title.rendered, date);
          renderContent();
        }
      }).catch(function() {
        document.getElementById('project-content').innerHTML = '<p>Could not load project.</p>';
      });

      getProjects().then(function(projects) {
        var related = projects.filter(function(p) { return p.slug !== slug; });
        if (related.length) {
          document.getElementById('related-grid').innerHTML = related.map(function(p) {
            return renderProjectCard(p, '../');
          }).join('');
          document.getElementById('related-work').style.display = '';
        }
      });
    }
  </script>

</body>
</html>
