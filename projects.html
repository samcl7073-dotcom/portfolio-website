<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects – Samantha C. Lai</title>
  <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">Samantha C. Lai</a>
      <nav class="main-nav">
        <ul>
          <li><a href="projects.html" class="nav-active">PROJECTS</a></li>
          <li><a href="blogs.html">BLOGS</a></li>
          <li><a href="about.html">ABOUT</a></li>
          <li><a href="contact.html">CONTACT</a></li>
        </ul>
      </nav>
      <button class="mobile-menu-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="listing-page">
    <div class="listing-header">
      <h1>Projects</h1>
    </div>
    <div class="projects-grid" id="projects-grid">
      <p class="loading-text">Loading projects...</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-logo">Samantha C. Lai</span>
      </div>
      <nav class="footer-nav">
        <ul>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="blogs.html">Blogs</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <div class="footer-social">
        <a href="https://www.instagram.com/occasions.places" target="_blank" rel="noopener">Instagram</a>
        <a href="https://500px.com/p/occasionsplaces?view=photos" target="_blank" rel="noopener">500px</a>
      </div>
      <div class="footer-legal">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </div>
  </footer>

  <script src="api.js"></script>
  <script>
    document.querySelector('.mobile-menu-btn').addEventListener('click', function() {
      document.querySelector('.main-nav').classList.toggle('open');
      this.classList.toggle('active');
    });

    getProjects().then(function(projects) {
      document.getElementById('projects-grid').innerHTML =
        projects.map(function(p) { return renderProjectCard(p, ''); }).join('');
    }).catch(function() {
      document.getElementById('projects-grid').innerHTML = '<p>Could not load projects.</p>';
    });
  </script>

</body>
</html>
